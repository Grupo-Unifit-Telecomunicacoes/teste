<!-- LENTE DUPLA - SVG personalizado (duas lentes) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
     fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
     width="48" height="48" style="stroke:#8a4fff;">

  <!-- Corpo da câmera -->
  <rect x="2" y="8" width="20" height="10" rx="2" />

  <!-- Lente principal (giratória - maior, centro) -->
  <circle cx="10" cy="13" r="3" />
  <circle cx="10" cy="13" r="1.2" />

  <!-- Lente secundária (fixa - menor, lado direito) -->
  <circle cx="17.5" cy="13" r="1.8" />
  <circle cx="17.5" cy="13" r="0.7" />

  <!-- Indicador de rotação (arco com seta) acima da lente maior -->
  <path d="M7.5 7 A3.5 3.5 0 0 1 12.5 7" />
  <polyline points="12 5.5 12.5 7 11 7.2" />
</svg>
